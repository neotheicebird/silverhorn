name: SilverHorn

options:
  bundleIdPrefix: club.skape
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: WXMUS27A23
    CODE_SIGN_STYLE: Automatic

targets:
  SilverHorn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SilverHorn
    dependencies:
      - target: SilverHornShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.skape.silverhorn
        INFOPLIST_FILE: SilverHorn/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SilverHorn/SilverHorn.entitlements
      properties:
        com.apple.security.application-groups:
          - group.club.skape.silverhorn
    info:
      path: SilverHorn/Info.plist
      properties:
        CFBundleName: Silver Horn
        CFBundleDisplayName: Silver Horn
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - silverhorn
        NSPhotoLibraryAddUsageDescription: "Silver Horn saves your social media cards to your photo library."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIDeviceFamily:
          - 1
        UILaunchScreen: {}

  SilverHornShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SilverHornShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: club.skape.silverhorn.shareextension
        INFOPLIST_FILE: SilverHornShareExtension/Info.plist
    entitlements:
      path: SilverHornShareExtension/SilverHornShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.club.skape.silverhorn
    info:
      path: SilverHornShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Silver Horn
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionPointIdentifier: com.apple.share-services
